name: Backup semanal MEUOJEC

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  backup:
    name: Supabase CSV ZIP Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Instalar dependencias
        run: npm install archiver @supabase/supabase-js

      - name: Crear directorio temporal
        run: mkdir -p tmp/backup

      - name: Exportar tablas y crear ZIP
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node --input-type=module << 'NODEOF'
          import { createClient } from "@supabase/supabase-js";
          import { createWriteStream } from "fs";
          import { writeFile, rm } from "fs/promises";
          import { join } from "path";
          import archiver from "archiver";

          const { SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY } = process.env;
          if (!SUPABASE_URL || !SUPABASE_SERVICE_ROLE_KEY) { console.error("Faltan vars Supabase"); process.exit(1); }

          const TABLES = [
            "miembros","miembros_historial","profiles","asistencias","eventos","eventos_sesiones",
            "contribuciones","fin_categorias","fin_cierres","fin_cuentas","fin_movimientos",
            "visitantes","visitantes_seguimiento","seguimiento_pastoral","ministerios","miembros_ministerios",
            "anuncios","agenda","roles","ded_clases","ded_sesiones","ded_sesion_detalle",
            "inv_categorias","inv_productos","inv_stock","inv_ubicaciones","inv_movimientos"
          ];

          function toCSV(rows) {
            if (!rows || rows.length === 0) return "";
            const headers = Object.keys(rows[0]);
            const esc = v => { if (v == null) return ""; const s = String(v); return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s; };
            return "﻿" + [headers.join(","), ...rows.map(r => headers.map(h => esc(r[h])).join(","))].join("\n");
          }

          async function fetchTable(sb, table) {
            let all = [], from = 0;
            for (;;) {
              const { data, error } = await sb.from(table).select("*").range(from, from + 999);
              if (error) throw new Error(error.message);
              if (!data || !data.length) break;
              all = all.concat(data);
              if (data.length < 1000) break;
              from += 1000;
            }
            return all;
          }

          const label = new Intl.DateTimeFormat("sv-SE", { timeZone:"America/Santiago", year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date());
          const tmpDir = "tmp/backup";
          const zipPath = "tmp/meuojec-backup-" + label + ".zip";

          console.log("Backup MEUOJEC:", label);
          const sb = createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, { auth: { persistSession: false } });

          let ok = 0, fail = 0;
          for (const t of TABLES) {
            try {
              const rows = await fetchTable(sb, t);
              await writeFile(join(tmpDir, t+".csv"), toCSV(rows), "utf-8");
              console.log("OK", t, rows.length, "filas");
              ok++;
            } catch(e) {
              console.warn("WARN", t, e.message);
              fail++;
            }
          }

          if (ok === 0) { console.error("Ninguna tabla exportada — revisa SUPABASE_SERVICE_ROLE_KEY"); process.exit(1); }

          await new Promise((res, rej) => {
            const out = createWriteStream(zipPath);
            const arc = archiver("zip", { zlib: { level: 9 } });
            out.on("close", res); arc.on("error", rej);
            arc.pipe(out); arc.directory(tmpDir, false); arc.finalize();
          });
          console.log("ZIP creado:", zipPath);
          console.log("Completado:", ok, "OK,", fail, "advertencias");
          NODEOF

      - name: Guardar backup como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: meuojec-backup-${{ github.run_id }}
          path: tmp/meuojec-backup-*.zip
          retention-days: 90

      - name: Limpiar temporales
        if: always()
        run: rm -rf tmp/
