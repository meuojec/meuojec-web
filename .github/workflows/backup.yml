name: Backup semanal a Google Drive

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  backup:
    name: Supabase CSV ZIP Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install googleapis archiver @supabase/supabase-js

      - name: Crear directorio temporal
        run: mkdir -p tmp

      - name: Ejecutar backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          node --input-type=module << 'NODEOF'
          import { createClient } from "@supabase/supabase-js";
          import { google } from "googleapis";
          import { createWriteStream, createReadStream } from "fs";
          import { mkdir, writeFile, rm } from "fs/promises";
          import { join, resolve } from "path";
          import archiver from "archiver";

          const { SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, GOOGLE_SERVICE_ACCOUNT_KEY, GOOGLE_DRIVE_FOLDER_ID } = process.env;
          if (!SUPABASE_URL || !SUPABASE_SERVICE_ROLE_KEY) { console.error("Faltan vars Supabase"); process.exit(1); }
          if (!GOOGLE_SERVICE_ACCOUNT_KEY || !GOOGLE_DRIVE_FOLDER_ID) { console.error("Faltan vars Google"); process.exit(1); }

          const TABLES = [
            "miembros","miembros_historial","profiles","asistencias","eventos","eventos_sesiones",
            "contribuciones","fin_categorias","fin_cierres","fin_cuentas","fin_movimientos",
            "visitantes","visitantes_seguimiento","seguimiento_pastoral","ministerios","miembros_ministerios",
            "anuncios","agenda","roles","ded_clases","ded_sesiones","ded_sesion_detalle",
            "inv_categorias","inv_productos","inv_stock","inv_ubicaciones","inv_movimientos"
          ];

          function toCSV(rows) {
            if (!rows || rows.length === 0) return "";
            const headers = Object.keys(rows[0]);
            const esc = v => { if (v == null) return ""; const s = String(v); return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s; };
            return "﻿" + [headers.join(","), ...rows.map(r => headers.map(h => esc(r[h])).join(","))].join("\n");
          }

          async function fetchTable(sb, table) {
            let all = [], from = 0;
            for (;;) {
              const { data, error } = await sb.from(table).select("*").range(from, from + 999);
              if (error) throw new Error(error.message);
              if (!data || !data.length) break;
              all = all.concat(data);
              if (data.length < 1000) break;
              from += 1000;
            }
            return all;
          }

          function nowChile() {
            return new Intl.DateTimeFormat("sv-SE", { timeZone:"America/Santiago", year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" }).format(new Date()).replace(" ","T").replace(/:/g,"-");
          }

          function zipDir(src, dest) {
            return new Promise((res, rej) => {
              const out = createWriteStream(dest);
              const arc = archiver("zip", { zlib: { level: 9 } });
              out.on("close", res); arc.on("error", rej);
              arc.pipe(out); arc.directory(src, false); arc.finalize();
            });
          }

          const label = nowChile();
          const tmpDir = resolve("tmp/backup-" + label);
          const zipPath = resolve("tmp/meuojec-backup-" + label + ".zip");

          console.log("Backup MEUOJEC:", label);
          const sb = createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, { auth: { persistSession: false } });
          await mkdir(tmpDir, { recursive: true });

          let ok = 0, fail = 0;
          for (const t of TABLES) {
            try { const rows = await fetchTable(sb, t); await writeFile(join(tmpDir, t+".csv"), toCSV(rows), "utf-8"); console.log("OK", t, rows.length); ok++; }
            catch(e) { console.warn("WARN", t, e.message); fail++; }
          }

          await zipDir(tmpDir, zipPath);
          console.log("ZIP creado");

          const creds = JSON.parse(GOOGLE_SERVICE_ACCOUNT_KEY);
          const auth = new google.auth.GoogleAuth({ credentials: creds, scopes: ["https://www.googleapis.com/auth/drive.file"] });
          const drive = google.drive({ version: "v3", auth });
          const { data: f } = await drive.files.create({
            requestBody: { name: "meuojec-backup-"+label+".zip", mimeType: "application/zip", parents: [GOOGLE_DRIVE_FOLDER_ID] },
            media: { mimeType: "application/zip", body: createReadStream(zipPath) },
            fields: "id,name"
          });
          console.log("Subido:", f.name, "id:", f.id);

          await rm(tmpDir, { recursive: true, force: true });
          await rm(zipPath, { force: true });
          console.log("Completado:", ok, "OK,", fail, "advertencias");
          if (fail > 0 && ok === 0) process.exit(1);
          NODEOF

      - name: Resumen
        if: always()
        run: echo "Backup finalizado"
